<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Portfolio</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="admin-page">
    <nav class="navbar">
        <div class="container">
            <div class="logo">Portfolio Admin</div>
            <div class="nav-links">
                <span id="user-email"></span>
                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div id="login-container" class="login-container">
        <div class="login-box">
            <h1>Admin Login</h1>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="login-error" class="error"></p>
            </form>
        </div>
    </div>

    <div id="dashboard-container" class="dashboard-container" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-menu">
                <button class="menu-btn active" data-section="projects">Projects</button>
                <button class="menu-btn" data-section="add-project">Add New Project</button>
            </div>
        </aside>

        <main class="admin-main">
            <!-- Projects Section -->
            <section id="projects-section" class="admin-section active">
                <h2>Manage Projects</h2>
                <div id="projects-list" class="projects-list">
                    <!-- Projects will be loaded here -->
                </div>
            </section>

            <!-- Add/Edit Project Section -->
            <section id="add-project-section" class="admin-section">
                <h2>Add New Project</h2>
                <form id="project-form" class="project-form">
                    <input type="hidden" id="project-id">
                    <div class="form-group">
                        <label for="project-title">Project Title *</label>
                        <input type="text" id="project-title" required>
                    </div>
                    <div class="form-group">
                        <label for="project-description">Description *</label>
                        <textarea id="project-description" required rows="5"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="project-image">Image URL</label>
                        <input type="text" id="project-image" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label for="project-link">Project Link</label>
                        <input type="text" id="project-link" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label for="project-tags">Tags (comma separated)</label>
                        <input type="text" id="project-tags" placeholder="React, JavaScript, Web">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submit-btn">Create Project</button>
                        <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">Cancel</button>
                    </div>
                    <p id="form-message"></p>
                </form>
            </section>
        </main>
    </div>

    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/admin.js"></script>
</body>
</html>
