<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Work - Dalvin Heyninck</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="work-body">
    <main class="work-shell">
        <header class="work-topbar">
            <a class="work-brand" href="index.html" aria-label="Go to intro page">
                <span>Portfolio</span>
                <strong>Dalvin Heyninck</strong>
            </a>

            <nav class="work-nav" aria-label="Primary navigation">
                <a class="work-nav-link is-active" href="work.html">My work</a>
                <a class="work-nav-link" href="about.html">About me</a>
                <a class="work-nav-link" href="contact.html">Contact</a>
                <a class="work-nav-link" href="index.html#more">More</a>
            </nav>
        </header>

        <section class="work-hero" aria-label="Work overview">
            <h1>My Work</h1>
            <p class="work-lead">
                A selection of projects grouped by the kind of work behind them. Use the categories to move between
                personal projects, college assignments, and CAD-focused exercises.
            </p>
        </section>

        <section class="work-filters" aria-label="Project categories">
            <div class="category-bar" id="category-bar"></div>
            <div class="detail-filter-block">
                <p class="detail-filter-label">Refine by discipline</p>
                <div class="detail-filter-bar" id="detail-filter-bar"></div>
            </div>
        </section>

        <section class="work-grid-wrap" aria-label="Project grid">
            <div class="work-grid" id="work-grid"></div>
        </section>
    </main>

    <script src="js/work.js"></script>

</html>
